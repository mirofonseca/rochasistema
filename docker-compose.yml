version: '3.8'

services:
  rocha-reboques:
    build: .
    container_name: rocha-reboques
    ports:
      - "3000:3000"
    volumes:
      # Persiste o banco SQLite fora do container
      - ./data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
